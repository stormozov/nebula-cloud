name: Frontend CI/CD

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

defaults:
    run:
        working-directory: ./frontend

jobs:
    lint-and-typecheck:
        name: 🔍 Lint & Type Check
        runs-on: ubuntu-latest
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🟢 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "yarn"
                  cache-dependency-path: "frontend/yarn.lock"

            - name: 📦 Install dependencies
              run: yarn install --frozen-lockfile

            - name: ✨ Run Biome check
              run: yarn biome:check

            - name: 🔎 Run ESLint
              run: yarn lint

            - name: 🔤 Run TypeScript check
              run: yarn typecheck

    test:
        # Disabled temporarily due to test instability
        if: false
        name: 🧪 Run Tests
        runs-on: ubuntu-latest
        needs: lint-and-typecheck
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🟢 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "yarn"
                  cache-dependency-path: "frontend/yarn.lock"

            - name: 📦 Install dependencies
              run: yarn install --frozen-lockfile

            - name: 🧪 Run tests with coverage
              run: yarn test:coverage

    build:
        needs: test
        if: ${{ success() || needs.test.result == 'skipped' }}
        name: 🏗️ Build Production
        runs-on: ubuntu-latest
        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4

            - name: 🟢 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "yarn"
                  cache-dependency-path: "frontend/yarn.lock"

            - name: 📦 Install dependencies
              run: yarn install --frozen-lockfile

            - name: 🏗️ Build frontend
              run: yarn build

            - name: 📦 Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-build
                  path: frontend/dist/
                  retention-days: 7
